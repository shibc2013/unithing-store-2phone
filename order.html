<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>确认订单</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Noto Sans CJK SC","Microsoft YaHei",sans-serif; background:#f5f5f5; color:#333; font-size:14px; line-height:1.6; }

/* ===== Header ===== */
.header { background:#fff; padding:12px 16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #eee; position:sticky; top:0; z-index:100; }
.back-btn { font-size:20px; color:#333; text-decoration:none; padding:4px 8px; border-radius:4px; transition:background .15s; }
.back-btn:hover { background:#f0f0f0; }
.header-title { font-size:17px; font-weight:600; color:#1a1a1a; }

.wrapper { max-width:700px; margin:0 auto; padding:16px; }

/* ===== Card ===== */
.card { background:#fff; border-radius:12px; padding:20px; margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.card-title { font-size:15px; font-weight:600; color:#1a1a1a; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #f0f0f0; }

/* ===== 商品信息 ===== */
.product-info { display:flex; gap:16px; align-items:flex-start; }
.product-icon { width:60px; height:60px; background:linear-gradient(135deg,#667eea,#764ba2); border-radius:12px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:20px; font-weight:700; flex-shrink:0; }
.product-detail h3 { font-size:16px; font-weight:600; color:#1a1a1a; margin-bottom:4px; }
.product-detail .sub { font-size:12px; color:#999; }

/* ===== 选项组 ===== */
.opt-group { margin-bottom:14px; }
.opt-label { font-size:13px; color:#666; margin-bottom:6px; font-weight:500; }
.opt-chips { display:flex; flex-wrap:wrap; gap:8px; }
.chip { padding:6px 14px; border:1px solid #e0e0e0; border-radius:20px; font-size:12px; color:#555; cursor:pointer; transition:all .15s; background:#fff; user-select:none; }
.chip:hover { border-color:#bbb; }
.chip.active { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }

/* ===== 收货信息 ===== */
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:13px; color:#666; margin-bottom:4px; }
.form-group input, .form-group textarea { width:100%; padding:10px 12px; border:1px solid #e0e0e0; border-radius:8px; font-size:14px; outline:none; transition:border .2s; font-family:inherit; }
.form-group input:focus, .form-group textarea:focus { border-color:#1a1a1a; }
.form-group textarea { resize:vertical; min-height:60px; }
.form-row { display:flex; gap:12px; }
.form-row .form-group { flex:1; }

/* ===== 订单摘要 ===== */
.summary-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; font-size:13px; color:#666; }
.summary-row .val { color:#333; font-weight:500; }
.summary-row.total { border-top:1px solid #f0f0f0; padding-top:12px; margin-top:4px; font-size:16px; font-weight:600; color:#1a1a1a; }
.summary-row.total .val { color:#c0392b; font-size:18px; }

/* ===== 提交按钮 ===== */
.submit-btn { width:100%; padding:14px; background:#1a1a1a; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; transition:all .15s; margin-top:8px; }
.submit-btn:hover { background:#333; }
.submit-btn:active { transform:scale(.98); }

/* ===== 运费 ===== */
.freight-tag { display:inline-block; padding:2px 8px; background:#e8f5e9; color:#2e7d32; border-radius:4px; font-size:11px; margin-left:6px; }

/* ===== 支付弹窗 ===== */
.overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); z-index:999; align-items:center; justify-content:center; }
.overlay.active { display:flex; }
.pay-modal { background:#fff; border-radius:16px; padding:24px 20px; max-width:360px; width:90%; text-align:center; animation:popIn .25s ease; }
@keyframes popIn { from { transform:scale(.9); opacity:0; } to { transform:scale(1); opacity:1; } }
.pay-modal .close-btn { position:absolute; top:12px; right:16px; font-size:22px; color:#999; cursor:pointer; line-height:1; }
.pay-modal .close-btn:hover { color:#333; }
.pay-title { font-size:17px; font-weight:600; color:#1a1a1a; margin-bottom:4px; }
.pay-amount { font-size:28px; font-weight:700; color:#c0392b; margin:8px 0 16px; }
.pay-amount small { font-size:14px; font-weight:400; color:#999; }

/* Tab 切换 */
.pay-tabs { display:flex; gap:0; margin-bottom:16px; border-radius:8px; overflow:hidden; border:1px solid #eee; }
.pay-tab { flex:1; padding:8px; font-size:13px; cursor:pointer; background:#fafafa; color:#666; transition:all .15s; border:none; font-family:inherit; }
.pay-tab.active { background:#1a1a1a; color:#fff; }
.pay-qr { width:200px; height:200px; margin:0 auto 12px; border:1px solid #eee; border-radius:8px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.pay-qr img { max-width:100%; max-height:100%; }
.pay-qr .qr-placeholder { color:#ccc; font-size:12px; }
.pay-tips { text-align:left; margin-top:12px; }
.pay-tips p { font-size:12px; color:#c0392b; line-height:1.8; padding-left:8px; border-left:3px solid #c0392b; }

/* ===== 响应式 ===== */
@media (max-width:500px) {
  .wrapper { padding:12px 10px; }
  .product-info { gap:12px; }
  .form-row { flex-direction:column; gap:0; }
}
</style>
</head>

<!-- ===== Header ===== -->

  <span class="header-title">确认订单</span>
</div>

<div class="wrapper">

    </div>
    <div class="form-group">
      <label>收货地址 *</label>

    </div>
    <div class="form-group">
      <label>备注（可选）</label>
      <textarea id="buyerNote" placeholder="如有特殊要求请在此备注"></textarea>
    </div>
  </div>

  <!-- ===== 订单摘要 ===== -->
  <div class="card">
    <div class="card-title">订单摘要</div>
    <div class="summary-row">
      <span>商品</span>
      <span class="val" id="summaryProduct">-</span>
    </div>
    <div class="summary-row">
      <span>颜色</span>
      <span class="val" id="summaryColor">请选择</span>
    </div>
    <div class="summary-row">
      <span>成色</span>
      <span class="val" id="summaryCond">准新</span>
    </div>
    <div class="summary-row">
      <span>内存</span>
      <span class="val" id="summaryRam">请选择</span>
    </div>
    <div class="summary-row">
      <span>存储</span>
      <span class="val" id="summaryRom">请选择</span>
    </div>
    <div class="summary-row">
      <span>运费</span>
      <span class="val">包邮 <span class="freight-tag">包邮</span></span>
    </div>
    <div class="summary-row total">
      <span>合计</span>
      <span class="val" id="summaryTotal">¥0</span>
    </div>
  </div>

  <!-- ===== 提交 ===== -->
  <button class="submit-btn" id="submitBtn">立即支付 ¥0</button>

</div><!-- /.wrapper -->

<!-- ===== 支付弹窗 ===== -->
<div class="overlay" id="payOverlay">

    </div>

    </div>
    <div class="pay-qr" id="qrAlipay" style="display:none;">

</div>

/* ===== 读取 URL 参数 ===== */
const params = new URLSearchParams(window.location.search);
const modelName = params.get('model') || '未知机型';
const price1 = parseInt(params.get('price1')) || 0;
const price2 = parseInt(params.get('price2')) || 0;
const price3 = parseInt(params.get('price3')) || 0;
const price4 = parseInt(params.get('price4')) || 0;

/* ===== 渲染商品信息 ===== */
document.getElementById('productName').textContent = modelName;
const phoneData = phoneDB[modelName] || { colors:['暂无数据'], rams:['暂不支持'], roms:['暂不支持'] };

// 生成颜色选项
const colorChips = document.getElementById('colorChips');
phoneData.colors.forEach((c, i) => {
  const chip = document.createElement('div');
  chip.className = 'chip' + (i === 0 ? ' active' : '');
  chip.textContent = c;
  chip.addEventListener('click', () => {
    colorChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    updateSummary();
  });
  colorChips.appendChild(chip);
});

// 生成 RAM 选项
const ramChips = document.getElementById('ramChips');
phoneData.rams.forEach((r, i) => {
  const chip = document.createElement('div');
  chip.className = 'chip' + (i === 0 ? ' active' : '');
  chip.textContent = r;
  chip.addEventListener('click', () => {
    ramChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    updateSummary();
  });
  ramChips.appendChild(chip);
});

// 生成 ROM 选项
const romChips = document.getElementById('romChips');
phoneData.roms.forEach((r, i) => {
  const chip = document.createElement('div');
  chip.className = 'chip' + (i === 0 ? ' active' : '');
  chip.textContent = r;
  chip.addEventListener('click', () => {
    romChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    updateSummary();
  });
  romChips.appendChild(chip);
});

/* ===== 成色选择 ===== */
const conditionChips = document.getElementById('conditionChips');
let currentMult = 1;
conditionChips.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    conditionChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentMult = parseFloat(chip.dataset.mult);
    updateSummary();
  });
});

/* ===== 更新摘要和价格 ===== */
function updateSummary() {
  const color = colorChips.querySelector('.chip.active')?.textContent || '未选';
  const cond = conditionChips.querySelector('.chip.active')?.textContent || '准新';
  const ram = ramChips.querySelector('.chip.active')?.textContent || '未选';
  const rom = romChips.querySelector('.chip.active')?.textContent || '未选';

  document.getElementById('summaryColor').textContent = color;
  document.getElementById('summaryCond').textContent = cond;
  document.getElementById('summaryRam').textContent = ram;
  document.getElementById('summaryRom').textContent = rom;

  // 价格 = 准新价 × 成色系数（示例计算）
  const basePrice = price1; // 准新价作为基准
  const finalPrice = Math.round(basePrice * currentMult);
  document.getElementById('summaryTotal').textContent = '¥' + finalPrice.toLocaleString();
  document.getElementById('submitBtn').textContent = '立即支付 ¥' + finalPrice.toLocaleString();
  document.getElementById('payAmount').innerHTML = '¥' + finalPrice.toLocaleString() + '<small>/' + modelName + '</small>';
}

/* ===== 初始摘要 ===== */
document.getElementById('summaryProduct').textContent = modelName + '（参考价）';
updateSummary();

/* ===== 表单验证 ===== */
document.getElementById('submitBtn').addEventListener('click', function() {
  const name = document.getElementById('buyerName').value.trim();
  const phone = document.getElementById('buyerPhone').value.trim();
  const address = document.getElementById('buyerAddress').value.trim();

  if (!name) { alert('请填写收货人姓名'); document.getElementById('buyerName').focus(); return; }
  if (!/^1\d{10}$/.test(phone)) { alert('请输入正确的11位手机号'); document.getElementById('buyerPhone').focus(); return; }
  if (!address) { alert('请填写收货地址'); document.getElementById('buyerAddress').focus(); return; }

  // 检查是否选择了 RAM/ROM
  const ram = ramChips.querySelector('.chip.active')?.textContent;
  const rom = romChips.querySelector('.chip.active')?.textContent;
  if (!ram || ram === '暂不支持') { alert('请选择运行内存（RAM）'); return; }
  if (!rom || rom === '暂不支持') { alert('请选择机身存储（ROM）'); return; }

  // 显示支付弹窗
  document.getElementById('payOverlay').classList.add('active');
});

/* ===== 关闭支付弹窗 ===== */
document.getElementById('payClose').addEventListener('click', () => {
  document.getElementById('payOverlay').classList.remove('active');
});
document.getElementById('payOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) {
    document.getElementById('payOverlay').classList.remove('active');
  }
});

/* ===== 切换微信/支付宝 ===== */
function switchPay(type) {
  const tabW = document.getElementById('tabWechat');
  const tabA = document.getElementById('tabAlipay');
  const qrW = document.getElementById('qrWechat');
  const qrA = document.getElementById('qrAlipay');

  if (type === 'wechat') {
    tabW.classList.add('active');
    tabA.classList.remove('active');
    qrW.style.display = 'flex';
    qrA.style.display = 'none';
  } else {
    tabA.classList.add('active');
    tabW.classList.remove('active');
    qrA.style.display = 'flex';
    qrW.style.display = 'none';
  }
}
